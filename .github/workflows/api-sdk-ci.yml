name: API SDK CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/sdk/**'
      - 'claudedocs/openapi-snapshot.json'
      - '.github/workflows/api-sdk-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/sdk/**'
      - 'claudedocs/openapi-snapshot.json'
      - '.github/workflows/api-sdk-ci.yml'

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: './packages/sdk'

jobs:
  test:
    name: Test SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (workspace root)
        run: npm install --no-fund --no-audit

      - name: Regenerate SDK from OpenAPI snapshot
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run generate

      - name: Drift guard — fail if generated SDK differs from committed
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if ! git diff --exit-code src/generated; then
            echo "::error::SDK generated output drifts from committed src/generated."
            echo "The OpenAPI snapshot has changed but the SDK hasn't been regenerated."
            echo "Fix: cd packages/sdk && npm run generate && git add src/generated && git commit"
            exit 1
          fi

      - name: Type-check + build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx tsc

      - name: Test pack
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm pack --dry-run

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (workspace root)
        run: npm install --no-fund --no-audit

      - name: Build SDK
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx tsc

      - name: Check version against npm
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @oriva/sdk version 2>/dev/null || echo "0.0.0")
          if [ "$PACKAGE_VERSION" != "$NPM_VERSION" ]; then
            echo "VERSION_CHANGED=true" >> $GITHUB_ENV
            echo "New version detected: $PACKAGE_VERSION (current: $NPM_VERSION)"
          else
            echo "VERSION_CHANGED=false" >> $GITHUB_ENV
            echo "Version unchanged: $PACKAGE_VERSION"
          fi

      - name: Publish to NPM
        working-directory: ${{ env.WORKING_DIRECTORY }}
        if: env.VERSION_CHANGED == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
